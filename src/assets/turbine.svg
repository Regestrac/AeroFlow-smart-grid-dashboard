<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Tower -->
  <rect x="47" y="40" width="6" height="55" fill="url(#towerGradient)" rx="2"/>
  
  <!-- Blades Container -->
  <g transform="translate(50, 35)">
    <!-- Blade 1 -->
    <path d="M0 0 C-8 -15 -12 -30 0 -45 C12 -30 8 -15 0 0" fill="url(#bladeGradient)" stroke="white" stroke-width="0.5" stroke-opacity="0.2"/>
    <!-- Blade 2 -->
    <path d="M0 0 C-8 -15 -12 -30 0 -45 C12 -30 8 -15 0 0" fill="url(#bladeGradient)" stroke="white" stroke-width="0.5" stroke-opacity="0.2" transform="rotate(120)"/>
    <!-- Blade 3 -->
    <path d="M0 0 C-8 -15 -12 -30 0 -45 C12 -30 8 -15 0 0" fill="url(#bladeGradient)" stroke="white" stroke-width="0.5" stroke-opacity="0.2" transform="rotate(240)"/>
    
    <!-- Hub -->
    <circle cx="0" cy="0" r="8" fill="#1E293B" stroke="#00D4FF" stroke-width="1"/>
    <circle cx="0" cy="0" r="3" fill="#00D4FF"/>
  </g>
  
  <!-- Gradients -->
  <defs>
    <linearGradient id="bladeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#94A3B8" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="towerGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="50%" stop-color="#64748B"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
  </defs>
</svg>
